name: Build Windows Binary

on:
  push:
    branches:
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Preuzmi kod
        uses: actions/checkout@v4

      - name: Instaliraj Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instaliraj zavisnosti
        run: |
          pip install pyinstaller psutil pystray pillow

      - name: Napravi Windows binary
        run: |
          pyinstaller --onefile --name user-monitor --noconsole --add-data "icon.py;." monitor.py

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: user-monitor-windows
          path: dist/user-monitor.exe